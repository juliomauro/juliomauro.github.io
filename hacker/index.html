html, body { height: 100%; background: #000300; color: #00dd33; font-family: 'Share Tech Mono', monospace; overflow: hidden; }

#matrix-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; opacity: 0.04; pointer-events: none;
}
body::after {
  content: ''; position: fixed; inset: 0;

/* ── BOOT ── */

}
#boot-screen.hidden { display: none; }
.boot-line { font-size: 21px; letter-spacing: 1px; color: #00aa22; margin-bottom: 5px; opacity: 0; }

.boot-warn { color: #ffaa00; }
@keyframes bfade { to { opacity: 1; } }

/* ── SHELL ── */

#term-header {
  padding: 9px 28px;

#term-header .hl { color: #00ff41; }
#prompt-area {
  padding: 10px 28px 2px;

}
#prompt-cmd { color: #00ff41; }
#cursor-blink {
  display: inline-block; width: 8px; height: 14px;
  background: #00ff41; vertical-align: middle;
  animation: cur 0.8s step-end infinite; margin-left: 1px;
}
@keyframes cur { 50% { opacity: 0; } }
#content-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 6px 28px 20px;
  scrollbar-width: thin; scrollbar-color: #004400 transparent;
}
#content-area::-webkit-scrollbar { width: 4px; }
#content-area::-webkit-scrollbar-thumb { background: #004400; border-radius: 2px; }
#status-bar {
  padding: 7px 28px;
  border-top: 1px solid #003300;
  display: flex; gap: 20px; flex-wrap: wrap;
  font-size: 19px; color: #006622; letter-spacing: 1px;
  flex-shrink: 0;
}
.kbd { color: #00aa22; border: 1px solid #004400; padding: 1px 5px; font-size: 18px; font-family: 'Share Tech Mono', monospace; }

const MX_FZ = 16; let mxCols, mxDrops;
function initMx() { mxCols = Math.floor(canvas.width / MX_FZ); mxDrops = Array(mxCols).fill(1); }
function drawMx() {
  ctx.fillStyle = 'rgba(0,3,0,0.04)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff41'; ctx.font = MX_FZ + 'px Share Tech Mono';

    ctx.fillText(MX_CHARS[Math.floor(Math.random() * MX_CHARS.length)], i * MX_FZ, mxDrops[i] * MX_FZ);
    if (mxDrops[i] * MX_FZ > canvas.height && Math.random() > 0.975) mxDrops[i] = 0;
    mxDrops[i]++;
  }
}

      path: 'networking/meshcore-brazil.md' },
    { tag: 'Security', level: 'Foundational',
      title: 'The Hidden Danger of Judging by Appearances',
      path: 'security/the-hidden-danger-of-judging-by-appearances.md' },

};

// ── STATE ──
let mode = 'listing'; // listing | section | exp-list | exp-detail | projects-list | writing-list | article
let cursor = 0;
let writingCursor = 0;
let projectsCursor = 0;
let experienceCursor = 0;

// ── BOOT ──
const BOOT_LINES = [
  '> BIOS v2026.06 — oruam.cloud terminal',
  '> Checking RAM... <span class="boot-ok">640K OK</span>',
  '> Loading kernel modules... <span class="boot-ok">[ OK ]</span>',
  '> Mounting /home/juliomauro... <span class="boot-ok">[ OK ]</span>',
  '> Reading profile... <span class="boot-ok">[ OK ]</span>',
  '> Security clearance... <span class="boot-warn">[ CHECKING ]</span>',
  '> Authentication: <span class="boot-ok">GRANTED</span>',
  '> Starting terminal interface...',
];

function runBoot() {
  const container = document.getElementById('boot-lines');
  let i = 0;
  function next() {
    if (i >= BOOT_LINES.length) {
      setTimeout(() => {
        document.getElementById('boot-screen').classList.add('hidden');
        document.getElementById('terminal').style.display = 'flex';
        renderListing();
        typePrompt('ls');
      }, 350);
      return;
    }
    const d = document.createElement('div');
    d.className = 'boot-line';
    d.innerHTML = BOOT_LINES[i];
    container.appendChild(d);
    requestAnimationFrame(() => d.classList.add('show'));
    i++;
    setTimeout(next, 140 + Math.random() * 100);
  }
  next();
}

// ── PROMPT ──
function typePrompt(cmd, cb) {
  const el = document.getElementById('prompt-cmd');
  el.textContent = '';
  let i = 0;
  (function tick() {
    if (i >= cmd.length) { if (cb) cb(); return; }
    el.textContent += cmd[i++];
    setTimeout(tick, 50 + Math.random() * 35);
  })();
}

function setPath(p) {
  document.getElementById('prompt-path').textContent = p;
  document.getElementById('term-path').textContent   = p;
}

// ── LISTING ──
function renderListing() {
  mode = 'listing';
  setPath('~');
  document.getElementById('section-view').style.display = 'none';
  const listing = document.getElementById('listing');
  listing.style.display = 'block';
  listing.innerHTML = '';
  MENU.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'ls-row' + (i === cursor ? ' active' : '');
    row.innerHTML =
      `<span class="ls-arrow">${i === cursor ? '▶' : ' '}</span>` +
      `<span class="ls-perms">${item.perms}</span>` +
      `<span class="ls-name">${item.name}</span>` +
      `<span class="ls-desc">&nbsp;&nbsp;${item.desc}</span>`;
    row.addEventListener('click', () => { cursor = i; refreshCursor(); openItem(MENU[cursor]); });
    listing.appendChild(row);
  });
}

function refreshCursor() {
  document.querySelectorAll('.ls-row').forEach((row, i) => {
    const on = i === cursor;
    row.classList.toggle('active', on);
    row.querySelector('.ls-arrow').textContent = on ? '▶' : ' ';
    if (on) row.scrollIntoView({ block: 'nearest' });
  });
}

// ── OPEN ──
function openItem(item) {
  if (item.type === 'writing') {
    writingCursor = 0;
    mode = 'writing-list';
    typePrompt('ls ' + item.name);
    setPath('~/writing');
    document.getElementById('listing').style.display = 'none';
    const sv = document.getElementById('section-view');
    sv.style.display = 'block';
    sv.innerHTML = '';
    renderWritingList(sv);
    document.getElementById('content-area').scrollTop = 0;
    return;
  }
  if (item.type === 'timeline') {
    experienceCursor = 0;
    mode = 'exp-list';
    typePrompt('ls ' + item.name);
    setPath('~/experience');
    document.getElementById('listing').style.display = 'none';
    const sv = document.getElementById('section-view');
    sv.style.display = 'block';
    sv.innerHTML = '';
    renderExperienceList(sv);
    document.getElementById('content-area').scrollTop = 0;
    return;
  }
  if (item.type === 'projects') {
    projectsCursor = 0;
    mode = 'projects-list';
    typePrompt('ls ' + item.name);
    setPath('~/projects');
    document.getElementById('listing').style.display = 'none';
    const sv = document.getElementById('section-view');
    sv.style.display = 'block';
    sv.innerHTML = '';
    renderProjectsList(sv);
    document.getElementById('content-area').scrollTop = 0;
    return;
  }
  mode = 'section';
  const cmd = item.type === 'text' ? 'cat ' + item.name : 'ls ' + item.name;
  typePrompt(cmd);
  setPath('~/' + item.id);
  document.getElementById('listing').style.display = 'none';
  const sv = document.getElementById('section-view');
  sv.style.display = 'block';
  sv.innerHTML = '';
  renderSection(item, sv);
  document.getElementById('content-area').scrollTop = 0;
}

// ── RENDER SECTION ──
function renderSection(item, el) {
  const h = mk('div', 'sv-head'); h.textContent = item.name; el.appendChild(h);

  if (item.type === 'text') {
    DATA.summary.forEach(line => {
      if (!line) { el.appendChild(mk('div', 'sv-blank')); return; }
      const d = mk('div', 'sv-text'); d.textContent = line; el.appendChild(d);
    });

  } else if (item.type === 'tags') {
    const grid = mk('div', 'sv-skill-grid');
    DATA.skills.forEach(s => { const d = mk('div', 'sv-skill'); d.textContent = s; grid.appendChild(d); });
    el.appendChild(grid);

  } else if (item.type === 'timeline') {
    DATA.experience.forEach(job => {
      const c = mk('div', 'sv-company'); c.textContent = job.company; el.appendChild(c);
      const m = mk('div', 'sv-meta');    m.textContent = job.meta;    el.appendChild(m);
      job.roles.forEach(role => {

  } else if (item.type === 'edu') {

      d.innerHTML = `<span class="school">${e.school}</span>  —  ${e.degree}<span class="period">${e.period}</span>`;
      el.appendChild(d);
    });

  } else if (item.type === 'certs') {
    DATA.certs.forEach(c => {
      const d = mk('div', 'sv-cert');
      d.innerHTML = `${c.name}<span class="issuer">${c.issuer}</span>`;
      el.appendChild(d);
    });

  } else if (item.type === 'projects') {
    const STATUS = { wip:'WIP', active:'ACTIVE', done:'DONE', growing:'GROWING' };
    DATA.projects.forEach(p => {
      const wrap = mk('div', 'sv-proj');
      const titleRow = mk('div', 'sv-proj-title');
      const num  = mk('span', 'sv-proj-num');   num.textContent  = p.num + '  ·  ' + p.year;
      const name = mk('span', '');              name.textContent = p.title;
      name.style.cssText = 'color:#00ff41;letter-spacing:2px;';
      const badge = mk('span', 'sv-proj-status status-' + p.status);
      badge.textContent = STATUS[p.status];
      titleRow.appendChild(num); titleRow.appendChild(name); titleRow.appendChild(badge);
      const meta = mk('div', 'sv-proj-meta'); meta.textContent = p.meta;
      const desc = mk('div', 'sv-proj-desc'); desc.textContent = p.desc;
      wrap.appendChild(titleRow); wrap.appendChild(meta); wrap.appendChild(desc);
      if (p.url) {
        const url = mk('div', 'sv-proj-url'); url.textContent = p.url; wrap.appendChild(url);
      }
      el.appendChild(wrap);
    });

  }

  const hint = mk('div', 'scroll-hint');
  hint.textContent = '↑↓ scroll  ·  Esc back  ·  q quit';
  el.appendChild(hint);
}

function renderWritingList(el) {
  el.innerHTML = '';
  const head = mk('div', 'sv-head'); head.textContent = 'writing/'; el.appendChild(head);
  DATA.writing.forEach((a, i) => {

// ── OPEN ARTICLE ──
function openArticle(article) {
  mode = 'article';
  const fname = article.path.split('/').pop();
  typePrompt('cat ' + fname);
  setPath('~/writing/' + fname.replace('.md', ''));

  const sv = document.getElementById('section-view');
  sv.innerHTML = '';
  document.getElementById('content-area').scrollTop = 0;

  const loading = mk('div', 'art-loading'); loading.textContent = '> fetching ' + article.path + '...'; sv.appendChild(loading);

  const RAW = 'https://raw.githubusercontent.com/juliomauro/sec-notes/main/';
  fetch(RAW + article.path)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(md => { sv.innerHTML = ''; renderMarkdown(md, sv); })
    .catch(() => {
      sv.innerHTML = '';
      const e = mk('div', 'art-error'); e.textContent = '> fetch failed — check connection or try github.com/juliomauro/sec-notes'; sv.appendChild(e);
    });
}

// ── MARKDOWN → TERMINAL ──
function renderMarkdown(md, el) {
  const lines = md.split('\n');
  let inCode = false, codeBuf = [], olCount = 0;

  function flushCode() {
    if (!codeBuf.length) return;
    const d = mk('div', 'art-code-block'); d.textContent = codeBuf.join('\n'); el.appendChild(d);
    codeBuf = [];
  }

  // inline: **bold**, *em*, `code`
  function inline(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<span style="color:#00ff41">$1</span>')
      .replace(/\*(.+?)\*/g,     '<span style="color:#00cc44">$1</span>')
      .replace(/`([^`]+)`/g,     '<span style="color:#00ddaa;background:rgba(0,255,65,0.06);padding:0 3px">$1</span>');
  }

  lines.forEach(raw => {
    const line = raw.trimEnd();

    if (line.startsWith('```')) {
      if (inCode) { flushCode(); inCode = false; }
      else        { inCode = true; }
      return;
    }
    if (inCode) { codeBuf.push(line); return; }

    if (!line.trim()) { el.appendChild(mk('div', 'art-blank')); olCount = 0; return; }
    if (/^---+$/.test(line)) { el.appendChild(mk('hr', 'art-hr')); return; }
    if (line.startsWith('# '))   { const d = mk('div','art-h1'); d.innerHTML = inline(line.slice(2));  el.appendChild(d); return; }
    if (line.startsWith('## '))  { const d = mk('div','art-h2'); d.innerHTML = inline(line.slice(3));  el.appendChild(d); return; }
    if (line.startsWith('### ')) { const d = mk('div','art-h3'); d.innerHTML = inline(line.slice(4));  el.appendChild(d); return; }
    if (line.startsWith('> '))   { const d = mk('div','art-blockquote'); d.innerHTML = inline(line.slice(2)); el.appendChild(d); return; }
    if (/^[-*] /.test(line))     { const d = mk('div','art-li'); d.innerHTML = inline(line.slice(2));  el.appendChild(d); return; }
    if (/^\d+\. /.test(line)) {
      olCount++;
      const d = mk('div','art-oli'); d.setAttribute('data-n', olCount); d.innerHTML = inline(line.replace(/^\d+\. /,'')); el.appendChild(d); return;
    }
    const d = mk('div','art-p'); d.innerHTML = inline(line); el.appendChild(d);
  });
  flushCode();

  const hint = mk('div', 'scroll-hint'); hint.textContent = '↑↓ scroll  ·  Esc back  ·  q quit'; el.appendChild(hint);
}

function mk(tag, cls) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  return el;
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (mode === 'listing') {
    if      (e.key === 'ArrowUp')   { e.preventDefault(); cursor = (cursor - 1 + MENU.length) % MENU.length; refreshCursor(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); cursor = (cursor + 1) % MENU.length; refreshCursor(); }
    else if (e.key === 'Enter')     { openItem(MENU[cursor]); }
    else if (e.key === 'q' || e.key === 'Q') { doExit(); }
  } else if (mode === 'exp-list') {
    const sv = document.getElementById('section-view');
    if      (e.key === 'ArrowUp')   { e.preventDefault(); experienceCursor = (experienceCursor - 1 + DATA.experience.length) % DATA.experience.length; refreshExperienceCursor(sv); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); experienceCursor = (experienceCursor + 1) % DATA.experience.length; refreshExperienceCursor(sv); }
    else if (e.key === 'Enter')     { openExperienceDetail(DATA.experience[experienceCursor]); }
    else if (e.key === 'Escape')    { goBack(); }
    else if (e.key === 'q' || e.key === 'Q') { doExit(); }
  } else if (mode === 'exp-detail') {
    const ca = document.getElementById('content-area');
    if      (e.key === 'ArrowDown') { e.preventDefault(); ca.scrollBy({ top:  45, behavior: 'smooth' }); }
    else if (e.key === 'ArrowUp')   { e.preventDefault(); ca.scrollBy({ top: -45, behavior: 'smooth' }); }
    else if (e.key === 'Escape')    { goBackToExperience(); }
    else if (e.key === 'q' || e.key === 'Q') { doExit(); }
  } else if (mode === 'projects-list') {
    const sv = document.getElementById('section-view');
    if      (e.key === 'ArrowUp')   { e.preventDefault(); projectsCursor = (projectsCursor - 1 + DATA.projects.length) % DATA.projects.length; refreshProjectsCursor(sv); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); projectsCursor = (projectsCursor + 1) % DATA.projects.length; refreshProjectsCursor(sv); }
    else if (e.key === 'Enter')     { openProject(DATA.projects[projectsCursor]); }
    else if (e.key === 'Escape')    { goBack(); }
    else if (e.key === 'q' || e.key === 'Q') { doExit(); }
  } else if (mode === 'writing-list') {
    const sv = document.getElementById('section-view');
    if      (e.key === 'ArrowUp')   { e.preventDefault(); writingCursor = (writingCursor - 1 + DATA.writing.length) % DATA.writing.length; refreshWritingCursor(sv); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); writingCursor = (writingCursor + 1) % DATA.writing.length; refreshWritingCursor(sv); }
    else if (e.key === 'Enter')     { openArticle(DATA.writing[writingCursor]); }
    else if (e.key === 'Escape')    { goBack(); }
    else if (e.key === 'q' || e.key === 'Q') { doExit(); }
  } else if (mode === 'article') {
    const ca = document.getElementById('content-area');
    if      (e.key === 'ArrowDown') { e.preventDefault(); ca.scrollBy({ top:  45, behavior: 'smooth' }); }
    else if (e.key === 'ArrowUp')   { e.preventDefault(); ca.scrollBy({ top: -45, behavior: 'smooth' }); }
    else if (e.key === 'Escape')    { goBackToWriting(); }
    else if (e.key === 'q' || e.key === 'Q') { doExit(); }
  } else {
    const ca = document.getElementById('content-area');
    if      (e.key === 'ArrowDown') { e.preventDefault(); ca.scrollBy({ top:  45, behavior: 'smooth' }); }
    else if (e.key === 'ArrowUp')   { e.preventDefault(); ca.scrollBy({ top: -45, behavior: 'smooth' }); }
    else if (e.key === 'Escape')    { goBack(); }
    else if (e.key === 'q' || e.key === 'Q') { doExit(); }
  }
});

// ── EXPERIENCE LIST ──

    el.appendChild(row);

  const hint = mk('div', 'scroll-hint'); hint.textContent = '↑↓ move  ·  Enter open  ·  Esc back'; el.appendChild(hint);
}

function refreshExperienceCursor(el) {
  el.querySelectorAll('.exp-row').forEach((row, i) => {
    const on = i === experienceCursor;
    row.classList.toggle('active', on);

}

const STATUS_COLOR = { wip: '#ffaa00', active: '#00ff41', done: '#00aa22', growing: '#00ccff' };

function renderProjectsList(el) {
  el.innerHTML = '';
  const head = mk('div', 'sv-head'); head.textContent = 'projects/'; el.appendChild(head);
  DATA.projects.forEach((p, i) => {
    const row = mk('div', 'pr-row' + (i === projectsCursor ? ' active' : ''));

      `<span class="pr-title">${p.title}</span>` +

function refreshProjectsCursor(el) {
  el.querySelectorAll('.pr-row').forEach((row, i) => {
    const on = i === projectsCursor;
    row.classList.toggle('active', on);
    row.querySelector('.pr-arrow').textContent = on ? '▶' : ' ';
    if (on) row.scrollIntoView({ block: 'nearest' });
  });

function openProject(p) {
  if (!p.url) return;
  const url = p.url.startsWith('http') ? p.url : 'https://' + p.url;
  typePrompt('open ' + url);
  window.open(url, '_blank');
}

function goBack() {
  typePrompt('cd ..');
  renderListing();
  typePrompt('ls');
}

function goBackToWriting() {
  mode = 'writing-list';
  typePrompt('cd ..');
  setPath('~/writing');
  const sv = document.getElementById('section-view');
  sv.innerHTML = '';
  renderWritingList(sv);
  document.getElementById('content-area').scrollTop = 0;
  typePrompt('ls writing/');
}

function doExit() {
  typePrompt('exit', () => setTimeout(() => window.location.href = '/', 500));
}

let typedBuf = '';
document.addEventListener('keypress', e => {
  typedBuf = (typedBuf + e.key).slice(-4);
  if (typedBuf === 'exit') doExit();
});

runBoot();
